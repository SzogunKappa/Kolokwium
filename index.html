<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id ="sidebar">
        <div id="inputy">
        <h1>Kalkulator mnożenia</h1>
        <div id="inputy">
        <a href="https://github.com/SzogunKappa/Kolokwium">Link do repozytorium</a>
    </div><br>    
    </div>
        <div id="inputy">
            <label for="liczba1">Liczba 1:</label>
            <input type="number" id="liczba1">
        </div>
        <br>
        <div id="inputy">
            <label for="liczba2">Liczba 1:</label>
            <input type="number" id="liczba2">
        </div>
        <div id="inputy">
            <input type="button" value="Przelicz" onclick="multi()">
        </div>
    
    </div>
    <div id ="mainbody">
        <div id="display">

        </div>
    </div>
</body>
</html>

<script>
    number1 = document.getElementById("liczba1")
    number2 = document.getElementById("liczba2")
    display = document.getElementById("display")

    function multi(){
        n1 = parseInt(number1.value)
        n2 = parseInt(number2.value)
        n1 = n1*n2
        display.innerHTML = n1
    }

</script>
