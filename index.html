<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id ="sidebar">
        <div id="inputy">
        <h1>Kalkulator mnożenia</h1>
        <div id="inputy">
        <a href="https://github.com/SzogunKappa/Kolokwium">Link do repozytorium</a>
    </div><br>    
    </div>
        <div id="inputy">
            <label for="liczba1">Liczba 1:</label>
            <input type="number" id="liczba1">
        </div>
        <br>
        <div id="inputy">
            <label for="liczba2">Liczba 2:</label>
            <input type="number" id="liczba2">
        </div>
        <div id="inputy">
            <input type="button" value="Przelicz" onclick="multi()">
        </div>
    
    </div>
    <div id ="mainbody">
        <div id="display">

        </div>
    </div>
</body>
</html>

<script>
    number1 = document.getElementById("liczba1")
    number2 = document.getElementById("liczba2")
    display = document.getElementById("display")

    function multi(){
        n1 = parseInt(number1.value)
        n2 = parseInt(number2.value)
        if (checkNumber(n1) && checkNumber(n2)){
            n3 = n1*n2
            display.innerHTML = "Wynik mnożenia "+n1+" i "+n2+" to "+n3
        }
        else{
            display.innerHTML = "Złe wartości! tylko liczby dodtanie i całkowite"
        }
        display.innerHTML = drawTable(n1,n2);
            const cells = document.querySelectorAll('td');
            cells.forEach(cell => {
            cell.addEventListener('click', () =>{
            console.log("Row index: " + cell.closest('tr').rowIndex + " | Column index: " + cell.cellIndex)
            display.innerHTML=drawTable(n1,n2,cell.closest('tr').rowIndex,cell.cellIndex)
            console.log("TEST")});
        })
    }

    function checkNumber(n){
        if (n <=0){
            return false
        }
        if (n%1 != 0){
            return false
        }
        return true
    }

    function drawTable(x,y,x_click,y_click){
        var HTML = "<table border=1 width=100%><tr>";
            for (j=1;j<y+1;j++){
                HTML+="<tr>"
            for (i=1;i<x+1;i++){
                if (i-1 == y_click){
                    HTML +="<td align=center id='yellow'>"+i*j+"</td>"
                    console.log("CLICK")
                }else{ 
                if (j == x_click){
                    HTML +="<td align=center id='yellow'>"+i*j+"</td>"
                    console.log("CLICK")
                }
                else{
                HTML +="<td align=center>"+i*j+"</td>"
                }
            }
            }
            HTML+="</tr>"
        }
        HTML += "</tr></table>";
        return HTML
    }




</script>
